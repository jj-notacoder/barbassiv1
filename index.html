<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Barbassi — Focaccia Kitchen &amp; Café · Port Zayed, Abu Dhabi</title>
  <meta name="description" content="Barbassi — a chic focaccia kitchen &amp; café in Port Zayed, Abu Dhabi. Our food lives in the background; we are meant to create conversation." />

  <!-- Fonts: Lora (body), Roboto Slab (Clarendon fallback), Cairo (Arabic) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Roboto+Slab:wght@400;500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Warm paper grain over the whole page -->
  <div class="grain" aria-hidden="true"></div>

  <!-- ───────────────────────── Header ───────────────────────── -->
  <header class="site-header" data-reveal>
    <a class="brand" href="#top" aria-label="Barbassi — home">
      <img class="brand-logo" src="logo.png" alt="Barbassi" />
    </a>

    <div class="main-nav" id="gooey-nav-container" style="position: relative; display: flex; justify-content: center; align-items: center;"></div>

    <div class="header-actions">
      <a class="ig-link" href="https://www.instagram.com/barbassi/" target="_blank" rel="noopener"
         aria-label="Barbassi on Instagram">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="5.2" stroke="currentColor" stroke-width="1.7"/>
          <circle cx="12" cy="12" r="4.1" stroke="currentColor" stroke-width="1.7"/>
          <circle cx="17.4" cy="6.6" r="1.25" fill="currentColor"/>
        </svg>
      </a>

      <button class="lang-toggle" type="button" aria-label="Switch language">
        <span class="lang en is-active">EN</span>
        <span class="lang-sep" aria-hidden="true">/</span>
        <span class="lang ar">ع</span>
      </button>
    </div>
  </header>

  <!-- ───────────────────────── Hero ───────────────────────── -->
  <main id="top">
    <section class="hero-grid">
      <!-- Left: location -->
      <div class="left-text">
        <h1 class="location-title" data-split>
          <span class="line" data-i18n="hero.line1">Focaccia Kitchen</span>
          <span class="line" data-i18n="hero.line2">&amp; Café</span>
          <span class="line accent" data-i18n="hero.line3">Port Zayed,</span>
          <span class="line accent" data-i18n="hero.line4">Abu Dhabi</span>
        </h1>
        <p class="address gradient-text" data-i18n="hero.address">
          Lunch! Lunch! Lunch!
        </p>
      </div>

      <!-- Center: logo + floating sandwich + CTA -->
      <div class="center-content">
        <img class="hero-logo" src="logo.png" alt="Barbassi" data-reveal />

        <div class="sandwich-wrap" data-parallax>
          <img class="sandwich" src="barbassi_sandwich_wink_transparent.png"
               alt="Barbassi focaccia sandwich" data-reveal />
        </div>

        <button class="gradient-button" type="button">
          <span class="gradient-text" data-i18n="cta">Discover More</span>
        </button>
      </div>

      <!-- Right: quote + Raj -->
      <div class="right-text">
        <figure class="quote">
          <p class="quote-text gradient-text" data-i18n="quote.text">
            “Our food lives in the background, we are meant to create conversation.”
          </p>
          <figcaption class="quote-author" data-i18n="quote.author">— Raj</figcaption>
        </figure>

        <div class="raj-wrap" data-raj>
          <img class="raj" src="raj clipart.png" alt="Raj waving" />
        </div>
      </div>
    </section>

    <!-- ─────────────────── Cinematic stripe transition ─────────────────── -->
    <section class="stripe-transition" id="menu">
      <!-- Hanging navy stripes (generated by JS, drop in on scroll) -->
      <div class="stripes" aria-hidden="true"></div>

      <div class="reveal-content">
        <p class="reveal-kicker" data-i18n="next.kicker">Mina Zayed · Abu Dhabi</p>
        <h2 class="reveal-title" data-i18n="next.title">The Menu</h2>
        <p class="reveal-sub" data-i18n="next.sub">
          Slow-proofed focaccia, layered by hand. Pull up a chair.
        </p>
      </div>
    </section>
  </main>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/i18next@23.11.5/i18next.min.js"></script>
  <script src="js/main.js?v=4"></script>

  <!-- React & Babel Standalone CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- GooeyNav React App -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const GooeyNav = ({
      items,
      animationTime = 600,
      particleCount = 15,
      particleDistances = [90, 10],
      particleR = 100,
      timeVariance = 300,
      colors = [1, 2, 3, 1, 2, 3, 1, 4],
      initialActiveIndex = 0
    }) => {
      const containerRef = useRef(null);
      const navRef = useRef(null);
      const filterRef = useRef(null);
      const textRef = useRef(null);
      const [activeIndex, setActiveIndex] = useState(initialActiveIndex);
      const [tick, setTick] = useState(0);

      // Sync with global i18next translations
      useEffect(() => {
        const handleLangChange = () => {
          setTick((t) => t + 1);
        };
        if (window.i18next) {
          window.i18next.on('languageChanged', handleLangChange);
          return () => {
            window.i18next.off('languageChanged', handleLangChange);
          };
        }
      }, []);

      const getLabel = (item) => {
        if (window.i18next) {
          const key = `nav.${item.label.toLowerCase()}`;
          return window.i18next.t(key) || item.label;
        }
        return item.label;
      };

      const noise = (n = 1) => n / 2 - Math.random() * n;
      const getXY = (distance, pointIndex, totalPoints) => {
        const angle = ((360 + noise(8)) / totalPoints) * pointIndex * (Math.PI / 180);
        return [distance * Math.cos(angle), distance * Math.sin(angle)];
      };

      const createParticle = (i, t, d, r) => {
        let rotate = noise(r / 10);
        return {
          start: getXY(d[0], particleCount - i, particleCount),
          end: getXY(d[1] + noise(7), particleCount - i, particleCount),
          time: t,
          scale: 1 + noise(0.2),
          color: colors[Math.floor(Math.random() * colors.length)],
          rotate: rotate > 0 ? (rotate + r / 20) * 10 : (rotate - r / 20) * 10
        };
      };

      const makeParticles = (element) => {
        const d = particleDistances;
        const r = particleR;
        const bubbleTime = animationTime * 2 + timeVariance;
        element.style.setProperty('--time', `${bubbleTime}ms`);
        for (let i = 0; i < particleCount; i++) {
          const t = animationTime * 2 + noise(timeVariance * 2);
          const p = createParticle(i, t, d, r);
          element.classList.remove('active');
          setTimeout(() => {
            const particle = document.createElement('span');
            const point = document.createElement('span');
            particle.classList.add('particle');
            particle.style.setProperty('--start-x', `${p.start[0]}px`);
            particle.style.setProperty('--start-y', `${p.start[1]}px`);
            particle.style.setProperty('--end-x', `${p.end[0]}px`);
            particle.style.setProperty('--end-y', `${p.end[1]}px`);
            particle.style.setProperty('--time', `${p.time}ms`);
            particle.style.setProperty('--scale', `${p.scale}`);
            particle.style.setProperty('--color', `var(--color-${p.color}, white)`);
            particle.style.setProperty('--rotate', `${p.rotate}deg`);
            point.classList.add('point');
            particle.appendChild(point);
            element.appendChild(particle);
            requestAnimationFrame(() => {
              element.classList.add('active');
            });
            setTimeout(() => {
              try {
                element.removeChild(particle);
              } catch {}
            }, t);
          }, 30);
        }
      };

      const updateEffectPosition = (element) => {
        if (!containerRef.current || !filterRef.current || !textRef.current) return;
        const containerRect = containerRef.current.getBoundingClientRect();
        const pos = element.getBoundingClientRect();
        const styles = {
          left: `${pos.x - containerRect.x}px`,
          top: `${pos.y - containerRect.y}px`,
          width: `${pos.width}px`,
          height: `${pos.height}px`
        };
        Object.assign(filterRef.current.style, styles);
        Object.assign(textRef.current.style, styles);
        textRef.current.innerText = element.innerText;
      };

      const handleClick = (e, index) => {
        const liEl = e.currentTarget.tagName === 'A' ? e.currentTarget.parentElement : e.currentTarget;
        if (activeIndex === index) return;
        setActiveIndex(index);
        updateEffectPosition(liEl);
        if (filterRef.current) {
          const particles = filterRef.current.querySelectorAll('.particle');
          particles.forEach(p => filterRef.current.removeChild(p));
        }
        if (textRef.current) {
          textRef.current.classList.remove('active');
          void textRef.current.offsetWidth;
          textRef.current.classList.add('active');
        }
        if (filterRef.current) {
          makeParticles(filterRef.current);
        }
      };

      const handleKeyDown = (e, index) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          const liEl = e.currentTarget.parentElement;
          if (liEl) {
            handleClick({ currentTarget: liEl }, index);
          }
        }
      };

      useEffect(() => {
        if (!navRef.current || !containerRef.current) return;
        const activeLi = navRef.current.querySelectorAll('li')[activeIndex];
        if (activeLi) {
          updateEffectPosition(activeLi);
          textRef.current?.classList.add('active');
        }
        const resizeObserver = new ResizeObserver(() => {
          const currentActiveLi = navRef.current?.querySelectorAll('li')[activeIndex];
          if (currentActiveLi) {
            updateEffectPosition(currentActiveLi);
          }
        });
        resizeObserver.observe(containerRef.current);
        return () => resizeObserver.disconnect();
      }, [activeIndex, tick]);

      return (
        <>
          <style>
            {`
              :root {
                --color-1: var(--orange, #FF7518);
                --color-2: var(--orange-glow, #FF9F1C);
                --color-3: var(--navy, #1A1D2D);
                --color-4: var(--cream-deep, #F3EDD9);
                --linear-ease: linear(0, 0.068, 0.19 2.7%, 0.804 8.1%, 1.037, 1.199 13.2%, 1.245, 1.27 15.8%, 1.274, 1.272 17.4%, 1.249 19.1%, 0.996 28%, 0.949, 0.928 33.3%, 0.926, 0.933 36.8%, 1.001 45.6%, 1.013, 1.019 50.8%, 1.018 54.4%, 1 63.1%, 0.995 68%, 1.001 85%, 1);
              }
              .gooey-nav-wrapper {
                position: relative;
                z-index: 10;
              }
              .effect {
                position: absolute;
                opacity: 1;
                pointer-events: none;
                display: grid;
                place-items: center;
                z-index: 1;
              }
              .effect.text {
                color: var(--navy, #1A1D2D);
                font-family: var(--font-display);
                font-weight: 500;
                font-size: clamp(0.92rem, 1.1vw, 1.05rem);
                letter-spacing: 0.02em;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: color 0.3s ease;
              }
              .effect.text.active {
                color: var(--cream, #FDFBEE);
              }
              .effect.filter {
                filter: blur(7px) contrast(100) blur(0);
                mix-blend-mode: multiply;
              }
              html[dir="rtl"] .effect.text {
                font-family: var(--font-ar);
              }
              .effect.filter::before {
                content: "";
                position: absolute;
                inset: -75px;
                z-index: -2;
                background: transparent;
              }
              .effect.filter::after {
                content: "";
                position: absolute;
                inset: 0;
                background: var(--navy, #1A1D2D);
                transform: scale(0);
                opacity: 0;
                z-index: -1;
                border-radius: 9999px;
              }
              .effect.active::after {
                animation: pill 0.3s ease both;
              }
              @keyframes pill {
                to {
                  transform: scale(1);
                  opacity: 1;
                }
              }
              .particle,
              .point {
                display: block;
                opacity: 0;
                width: 20px;
                height: 20px;
                border-radius: 9999px;
                transform-origin: center;
              }
              .particle {
                --time: 5s;
                position: absolute;
                top: calc(50% - 10px);
                left: calc(50% - 10px);
                animation: particle calc(var(--time)) ease 1 -350ms;
              }
              .point {
                background: var(--color);
                opacity: 1;
                animation: point calc(var(--time)) ease 1 -350ms;
              }
              @keyframes particle {
                0% {
                  transform: rotate(0deg) translate(calc(var(--start-x)), calc(var(--start-y)));
                  opacity: 1;
                  animation-timing-function: cubic-bezier(0.55, 0, 1, 0.45);
                }
                70% {
                  transform: rotate(calc(var(--rotate) * 0.5)) translate(calc(var(--end-x) * 1.2), calc(var(--end-y) * 1.2));
                  opacity: 1;
                  animation-timing-function: ease;
                }
                85% {
                  transform: rotate(calc(var(--rotate) * 0.66)) translate(calc(var(--end-x)), calc(var(--end-y)));
                  opacity: 1;
                }
                100% {
                  transform: rotate(calc(var(--rotate) * 1.2)) translate(calc(var(--end-x) * 0.5), calc(var(--end-y) * 0.5));
                  opacity: 1;
                }
              }
              @keyframes point {
                0% {
                  transform: scale(0);
                  opacity: 0;
                  animation-timing-function: cubic-bezier(0.55, 0, 1, 0.45);
                }
                25% {
                  transform: scale(calc(var(--scale) * 0.25));
                }
                38% {
                  opacity: 1;
                }
                65% {
                  transform: scale(var(--scale));
                  opacity: 1;
                  animation-timing-function: ease;
                }
                85% {
                  transform: scale(var(--scale));
                  opacity: 1;
                }
                100% {
                  transform: scale(0);
                  opacity: 0;
                }
              }
              li.active {
                color: var(--cream, #FDFBEE) !important;
                text-shadow: none;
              }
              li.active::after {
                opacity: 1;
                transform: scale(1);
              }
              li::after {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 9999px;
                background: var(--navy, #1A1D2D);
                opacity: 0;
                transform: scale(0);
                transition: all 0.3s ease;
                z-index: -1;
              }
              .gooey-nav-list {
                display: flex;
                gap: clamp(1.1rem, 2.6vw, 2.6rem);
                list-style: none;
                padding: 0;
                margin: 0;
                position: relative;
                z-index: 3;
                font-family: var(--font-display);
                font-weight: 500;
                font-size: clamp(0.92rem, 1.1vw, 1.05rem);
                letter-spacing: 0.02em;
              }
              html[dir="rtl"] .gooey-nav-list {
                font-family: var(--font-ar);
              }
              .gooey-nav-link {
                outline: none;
                padding: 0.35rem 1.1rem;
                display: inline-block;
                text-decoration: none;
                color: inherit;
                transition: color 0.35s ease;
              }
            `}
          </style>
          <div className="gooey-nav-wrapper" ref={containerRef}>
            <nav style={{ transform: 'translate3d(0,0,0.01px)', display: 'flex' }}>
              <ul ref={navRef} className="gooey-nav-list">
                {items.map((item, index) => (
                  <li
                    key={index}
                    className={`rounded-full relative cursor-pointer ${
                      activeIndex === index ? 'active' : ''
                    }`}
                    style={{
                      color: activeIndex === index ? 'var(--cream)' : 'var(--navy)'
                    }}
                  >
                    <a
                      href={item.href}
                      onClick={(e) => handleClick(e, index)}
                      onKeyDown={(e) => handleKeyDown(e, index)}
                      className="gooey-nav-link"
                    >
                      {getLabel(item)}
                    </a>
                  </li>
                ))}
              </ul>
            </nav>
            <span className="effect filter" ref={filterRef} />
            <span className="effect text" ref={textRef} />
          </div>
        </>
      );
    };

    const items = [
      { label: "Home", href: "#top" },
      { label: "About", href: "#about" },
      { label: "Menu", href: "#menu" },
      { label: "Location", href: "#location" },
    ];

    const root = ReactDOM.createRoot(document.getElementById('gooey-nav-container'));
    root.render(
      <GooeyNav
        items={items}
        particleCount={15}
        particleDistances={[90, 10]}
        particleR={100}
        initialActiveIndex={0}
        animationTime={600}
        timeVariance={300}
        colors={[1, 2, 3, 1, 2, 3, 1, 4]} 
      />
    );
  </script>
</body>
</html>
